name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      # 构建后端
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - name: Build Backend
        run: |
          cd honxinggrow-end
          mvn clean package -DskipTests
      
      # 构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
      
      - name: Build Frontend
        run: |
          cd honxinggrow-end/ruoyi-ui
          npm install
          npm run build:prod
      
      # 部署到服务器
      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 22
          source: "honxinggrow-end/ruoyi-admin/target/ruoyi-admin.jar"
          target: "/www/wwwroot/HXCZ/honxinggrow-end/ruoyi-admin/target/"

      - name: Deploy Frontend
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 22
          source: "honxinggrow-end/ruoyi-ui/dist"
          target: "/www/wwwroot/HXCZ/honxinggrow-end/ruoyi-ui/"

      - name: Restart Service
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            mkdir -p /www/wwwroot/HXCZ/logs /www/wwwroot/HXCZ/upload
            mkdir -p /www/wwwroot/HXCZ/honxinggrow-end/ruoyi-admin/target
            cd /www/wwwroot/HXCZ/honxinggrow-end/ruoyi-admin/target

            # 停止旧的后端服务
            pkill -f ruoyi-admin.jar || true
            sleep 2

            # 启动后端，只绑定到127.0.0.1，不对外暴露
            nohup java -jar ruoyi-admin.jar --spring.profiles.active=druid --server.address=127.0.0.1 > /www/wwwroot/HXCZ/app.log 2>&1 &
