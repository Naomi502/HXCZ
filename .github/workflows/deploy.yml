name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      # 构建后端
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - name: Build Backend
        run: |
          cd honxinggrow-end
          mvn clean package -DskipTests
      
      # 构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
      
      - name: Build Frontend
        run: |
          cd honxinggrow-end/ruoyi-ui
          npm install
          npm run build:prod
      
      # 部署到服务器
      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}
          port: 22
          source: "honxinggrow-end/ruoyi-admin/target/ruoyi-admin.jar"
          target: "/www/wwwroot/HXCZ/"

      - name: Deploy Frontend
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}
          port: 22
          source: "honxinggrow-end/ruoyi-ui/dist"
          target: "/www/wwwroot/HXCZ/"
      - name: Check host presence
        run: |
          if [ -z "${{ secrets.HOST }}" ]; then
            echo "HOST secret is not set" ; exit 1; fi
          if [ -z "${{ secrets.KEY }}" ]; then
            echo "KEY secret is not set" ; exit 1; fi

      - name: Test SSH reachability
        run: |
          echo "Testing SSH reachability to ${{ secrets.HOST }}:22"
          nc -zv "${{ secrets.HOST }}" 22 || (echo "SSH port not reachable" ; exit 1)

      - name: Restart Service
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}
          port: 22
          script: |
            cd /www/wwwroot/HXCZ
            pkill -f ruoyi-admin.jar || true
            nohup java -jar ruoyi-admin.jar --spring.profiles.active=druid > app.log 2>&1 &
