name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      # 构建后端
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - name: Build Backend
        run: |
          cd honxinggrow-end
          mvn clean package -DskipTests
      
      # 构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
      
      - name: Build Frontend
        run: |
          cd honxinggrow-end/ruoyi-ui
          npm install
          npm run build:prod
      
      # 部署到服务器
      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          source: |
            honxinggrow-end/ruoyi-admin/target/ruoyi-admin.jar
            honxinggrow-end/ruoyi-ui/dist
          target: /www/wwwroot/HXCZ/
      
      - name: Restart Service
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          source: |
            honxinggrow-end/ruoyi-admin/target/ruoyi-admin.jar
            honxinggrow-end/ruoyi-ui/dist
          target: /www/wwwroot/HXCZ/
      
      # 重启服务
      - name: Restart Service
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}
          script: |
            cd /www/wwwroot/HXCZ
            pkill -f ruoyi-admin.jar || true
            mv dist /www/wwwroot/HXCZ/
            nohup java -jar ruoyi-admin.jar --spring.profiles.active=druid > app.log 2>&1 &
