  backend:
    image: hxcz-backend:prod
    build:
      context: ./honxinggrow-end
      dockerfile: ruoyi-admin/Dockerfile
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_OPTS: ${JAVA_OPTS:--Dlog.path=/data/logs}
      SPRING_PROFILES_ACTIVE: docker,druid
      MYSQL_HOST: 59.110.229.252
      MYSQL_PORT: 3306
      MYSQL_DATABASE: yzpc
      MYSQL_USER: yzpc
      MYSQL_PASSWORD: ZnYAtKHC4KEfJJcW
      REDIS_HOST: 59.110.229.252
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      RUOYI_PROFILE: /data/upload
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./bt-data/upload:/data/upload
      - ./bt-data/logs:/data/logs
    restart: unless-stopped

  admin-web:
    image: hxcz-admin-web:prod
    build:
      context: ./honxinggrow-end/ruoyi-ui
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${ADMIN_PORT:-8081}:80"
    depends_on:
      - backend
    restart: unless-stopped

