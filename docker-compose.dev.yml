services:
  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yzpc}
      MYSQL_USER: ${MYSQL_USER:-ruoyi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ruoyi}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/00_init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./yzpc_2026-01-21_04-00-01_mysql_data.sql:/docker-entrypoint-initdb.d/sql/yzpc_mysql_data.sql:ro
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    image: hxcz-backend:dev
    build:
      context: ./honxinggrow-end
      dockerfile: ruoyi-admin/Dockerfile.dev
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_OPTS: ${JAVA_OPTS:--Dlog.path=/data/logs}
      SPRING_PROFILES_ACTIVE: docker,druid
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yzpc}
      MYSQL_USER: ${MYSQL_USER:-ruoyi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ruoyi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUOYI_PROFILE: /data/upload
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./honxinggrow-end:/workspace
      - m2_cache:/root/.m2
      - ./bt-data/upload:/data/upload
      - ./bt-data/logs:/data/logs
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  admin-web:
    image: hxcz-admin-web:dev
    build:
      context: ./honxinggrow-end/ruoyi-ui
      dockerfile: Dockerfile.dev
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CHOKIDAR_USEPOLLING: "true"
      VUE_APP_PROXY_TARGET: http://backend:8080
      npm_config_port: "80"
    ports:
      - "${ADMIN_PORT:-8081}:80"
    volumes:
      - ./honxinggrow-end/ruoyi-ui:/app
      - node_modules_cache:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  m2_cache:
  node_modules_cache:
